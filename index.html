<!DOCTYPE html>
<html lang="en">
<head>
   <title>Todo App</title>
   <link rel="stylesheet" href="todo.css">
</head>
<body>
   <header>
      <h1><span id="greeting"></span></h1><br><h1 id="heading">Your Todo's</h1>
   </header>
   <main>
      <section class="whole">
         <section class="add-container">
            <input type="text" placeholder="Type Your Todo" id="Your-todo" class="add-btn">
            <input type="date"  id="todo-date" class="add-btn">
            <button  id="todo-add" class="add-btn" onclick="add_btn_click()">Add (Press Enter)</button>
         </section>
      </section>
   </main>
   <footer></footer>
   <script src="todo.js"></script>
</body>
</html>
